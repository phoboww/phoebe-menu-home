<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主厨的私房菜单 | My Secret Menu</title>
    <style>
        /* 保持之前的优雅餐厅样式 */
        body { background-color: #fbf9f3; color: #222; font-family: 'PingFang SC', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #d3c2a0; padding: 40px; box-shadow: 0 4px 25px rgba(0,0,0,0.03); background: #fff; }
        header { text-align: center; border-bottom: 2px double #d3c2a0; padding-bottom: 20px; margin-bottom: 30px; }
        header h1 { font-size: 2.3rem; margin: 0 0 10px 0; letter-spacing: 3px; }
        
        /* 导航与列表 */
        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: #777; padding: 6px 16px; border-radius: 20px; }
        .tab-btn.active, .tab-btn:hover { color: #fff; background-color: #8c7653; }
        .menu-section { display: grid; gap: 25px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 6px; }
        .menu-item:hover { background-color: #fcf9f2; }
        .item-info { flex-grow: 1; padding-right: 20px; }
        .item-name { font-size: 1.2rem; font-weight: bold; }
        .item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
        .item-dots { flex-grow: 1; border-bottom: 1px dotted #ccc; margin: 0 10px; align-self: flex-end; }

        /* 后台管理区域 */
        #adminSection { margin-top: 50px; padding-top: 30px; border-top: 1px dashed #d3c2a0; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { background: #8c7653; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        /* 2.0 新增：后台菜品管理列表样式 */
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #fdfcf9; border: 1px solid #eee; margin-bottom: 5px; border-radius: 4px; }
        .delete-btn { background: #d9534f; color: white; border: none; padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 0.85rem; }
        .delete-btn:hover { background: #c9302c; }
        .admin-toggle { text-align: center; margin-top: 40px; font-size: 0.8rem; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>THE PRIVATE MENU</h1>
        <p>— 主厨的私房菜谱 —</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filterMenu('all')">全部</button>
        <button class="tab-btn" onclick="filterMenu('中餐')">中餐</button>
        <button class="tab-btn" onclick="filterMenu('西餐')">西餐</button>
        <button class="tab-btn" onclick="filterMenu('烘焙')">烘焙</button>
        <button class="tab-btn" onclick="filterMenu('咖啡调配')">咖啡调配</button>
    </div>

    <div class="menu-section" id="menuContainer"></div>

    <div class="admin-toggle" onclick="handleAdminClick()">开启主厨录入后台</div>

    <div id="adminSection">
        <h3>🔑 主厨核心配置</h3>
        <div class="form-group">
            <label>GitHub Token:</label>
            <input type="password" id="ghToken" placeholder="输入你的 GitHub Fine-grained Token">
        </div>
        <div class="form-group">
            <label>GitHub 用户名:</label>
            <input type="text" id="ghUser" placeholder="例如: phoboww">
        </div>
        <div class="form-group">
            <label>仓库名称:</label>
            <input type="text" id="ghRepo" placeholder="例如: phoebe-menu-home">
        </div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
        
        <h3>🍳 添加新菜品</h3>
        <div class="form-group">
            <label>菜品名称:</label>
            <input type="text" id="foodName" placeholder="如：经典冰拿铁">
        </div>
        <div class="form-group">
            <label>分类:</label>
            <select id="foodCategory">
                <option value="中餐">中餐</option>
                <option value="西餐">西餐</option>
                <option value="烘焙">烘焙</option>
                <option value="咖啡调配">咖啡调配</option>
            </select>
        </div>
        <div class="form-group">
            <label>图片网址 (Image URL):</label>
            <input type="text" id="foodImg" placeholder="贴上图片直链">
        </div>
        <div class="form-group">
            <label>主厨笔记 / 描述:</label>
            <textarea id="foodNotes" rows="3" placeholder="写下你的成功秘诀..."></textarea>
        </div>
        <button class="submit-btn" onclick="submitToGithub('add')">🚀 保存并发布到网站</button>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

        <h3>🗑️ 菜单盘点与删减 (2.0)</h3>
        <div id="adminRecipeList"></div>
    </div>
</div>

<script>
    // 基础菜品数据库
    let defaultRecipes = [];

    let recipes = JSON.parse(localStorage.getItem('my_recipes')) || defaultRecipes;

    // 前端展示渲染
    function renderMenu(data) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = '';
        data.forEach(item => {
            container.insertAdjacentHTML('beforeend', `
                <div class="menu-item">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div style="font-size:0.9rem; color:#666; margin-top:5px;">${item.notes}</div>
                    </div>
                    <div class="item-dots"></div>
                    <img class="item-img" src="${item.img || 'https://via.placeholder.com/150'}" alt="${item.name}">
                </div>
            `);
        });
    }

    // 后台列表渲染（带删除按钮）
    function renderAdminList() {
        const adminListContainer = document.getElementById('adminRecipeList');
        adminListContainer.innerHTML = '';
        recipes.forEach(item => {
            adminListContainer.insertAdjacentHTML('beforeend', `
                <div class="admin-list-item">
                    <span><strong>[${item.category}]</strong> ${item.name}</span>
                    <button class="delete-btn" onclick="deleteRecipe(${item.id}, '${item.name}')">❌ 删除</button>
                </div>
            `);
        });
    }

    function filterMenu(category) {
        if (category === 'all') renderMenu(recipes);
        else renderMenu(recipes.filter(r => r.category === category));
    }

    // 点击 3 下开后台
    let clickCount = 0;
    function handleAdminClick() {
        clickCount++;
        if(clickCount >= 3) {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
            document.getElementById('ghUser').value = localStorage.getItem('gh_user') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
            renderAdminList(); // 展开后台时顺便把管理列表画出来
        }
    }

    // 点击删除触发的逻辑
    function deleteRecipe(id, name) {
        if(confirm(`确定要把【${name}】从菜单中划掉吗？此操作会自动更新网站。`)) {
            // 过滤掉被删的菜
            recipes = recipes.filter(r => r.id !== id);
            // 拿着更新后的最新数组去推给 GitHub
            submitToGithub('delete');
        }
    }

    // 🌟 统一的 GitHub 数据同步核心（支持新增和删除）
    async function submitToGithub(actionType) {
        const token = document.getElementById('ghToken').value;
        const user = document.getElementById('ghUser').value;
        const repo = document.getElementById('ghRepo').value;

        if(!token || !user || !repo) {
            alert('请先填好顶部的 GitHub 配置（Token、用户名、仓库名）！');
            return;
        }

        // 如果是新增操作，提取表单值并塞进数组
        if (actionType === 'add') {
            const name = document.getElementById('foodName').value;
            const category = document.getElementById('foodCategory').value;
            const img = document.getElementById('foodImg').value || "https://images.unsplash.com/photo-1495521821757-a1efb6729352?w=150";
            const notes = document.getElementById('foodNotes').value;
            if(!name) { alert('菜品名称不能为空哦！'); return; }
            
            recipes.push({ id: Date.now(), name, category, img, notes });
        }

        // 先存一下浏览器本地防止丢失
        localStorage.setItem('my_recipes', JSON.stringify(recipes));
        localStorage.setItem('gh_token', token);
        localStorage.setItem('gh_user', user);
        localStorage.setItem('gh_repo', repo);

        const url = `https://api.github.com/repos/${user}/${repo}/contents/index.html`;
        
        try {
            // 获取当前最新代码文件的 sha
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const fileData = await res.json();
            const sha = fileData.sha;
            let oldCode = decodeURIComponent(escape(atob(fileData.content)));

            // 生成要替换进去的新代码段
            const updatedRecipesCode = `let defaultRecipes = ${JSON.stringify(recipes, null, 4)};`;
            let newCode = oldCode.replace(/let defaultRecipes = \[\s*[\s\S]*?\];/, updatedRecipesCode);

            // 推回 GitHub 
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: actionType === 'add' ? `主厨添加了新菜品` : `主厨删除了菜品`,
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: sha
                })
            });

            if(putRes.ok) {
                alert('🎉 操作成功！GitHub 正在同步，大概 1 分钟后刷新网站即可看到最新菜单！');
                location.reload();
            } else {
                const err = await putRes.json();
                alert('同步失败，请检查配置：' + err.message);
            }
        } catch (e) {
            alert('发生未知错误：' + e.message);
        }
    }

    renderMenu(recipes);
</script>
</body>
</html>
