<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoebe's Order System | 菲比的私房点单台</title>
    <style>
        /* 延续专属莫兰迪高级色盘 */
        body { 
            background-color: #2F3B36; 
            color: #F7F6EE; 
            font-family: 'Times New Roman', 'Georgia', 'PingFang SC', sans-serif; 
            margin: 0; 
            padding: 40px 20px;
            letter-spacing: 1px;
        }
        
        .container { 
            max-width: 1200px; /* 放大容器，给板块布局更多空间 */
            margin: 0 auto; 
            border: 1px solid #4D5C56; 
            padding: 40px; 
            background: #3B4A43; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 340px; 
            gap: 40px;
            /* 开启整个容器的3D景深空间 */
            perspective: 1000px;
        }

        @media (max-width: 992px) {
            .container { grid-template-columns: 1fr; padding: 20px; }
        }

        .main-content { grid-column: span 1; }

        header { 
            text-align: center; 
            border-bottom: 1px solid #4D5C56; 
            padding-bottom: 25px; 
            margin-bottom: 30px; 
        }
        header h1 { font-size: 2.4rem; margin: 0 0 10px 0; letter-spacing: 6px; color: #EFDB96; font-weight: 300; }
        header p { font-style: italic; color: #B7CDC2; margin: 0; font-size: 0.9rem; letter-spacing: 2px; }
        
        .nav-tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid #4D5C56; padding-bottom: 15px; }
        .tab-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; color: #EAE6DA; padding: 6px 12px; transition: all 0.3s; letter-spacing: 2px; }
        .tab-btn.active, .tab-btn:hover { color: #EFDB96; border-bottom: 1px solid #EFDB96; }

        /* ==================== 🛠️ UI设计师重构：3D网格板块 ==================== */
        .menu-section { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); /* 自动响应式网格 */
            gap: 25px; 
        }
        
        .menu-item { 
            position: relative;
            height: 320px; /* 固定板块高度 */
            border-radius: 10px;
            overflow: hidden;
            background-color: #2F3B36;
            border: 1px solid #4D5C56;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            
            /* 核心：3D与动画过渡设置 */
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease;
            cursor: pointer;
        }
        
        /* 鼠标悬停时的 3D 微悬浮与倾斜视觉 */
        .menu-item:hover {
            transform: translateY(-8px) rotateX(4deg) rotateY(-2deg);
            box-shadow: 0 22px 40px rgba(0,0,0,0.4);
            border-color: #EFDB96;
        }

        /* 隐藏的原生样式覆盖，改用全景大图背景 */
        .item-bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 悬停时图片放大比例 */
        .menu-item:hover .item-bg-img {
            transform: scale(1.12);
        }

        /* 默认状态：仅精致显示菜名板块 */
        .item-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15, 23, 20, 0.85) 30%, rgba(15, 23, 20, 0.2) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
            transition: background 0.4s ease;
        }

        .item-name { 
            font-size: 1.3rem; 
            color: #EFDB96; 
            margin-bottom: 0px;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            transition: transform 0.4s ease;
            transform: translateY(45px); /* 将菜名往下拉，留出空白 */
        }
        
        /* 悬停时菜名归位 */
        .menu-item:hover .item-name {
            transform: translateY(0);
        }

        /* 默认隐藏的细节内容 */
        .item-details {
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
            margin-top: 8px;
        }

        /* 悬停时显示细节（主厨笔记和点单按钮） */
        .menu-item:hover .item-details {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .item-notes { 
            font-size: 0.85rem; 
            color: #B7CDC2; 
            font-style: italic; 
            line-height: 1.5; 
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .order-action { display: block; }
        .btn-order { 
            width: 100%;
            background: #EFDB96; 
            color: #2F3B36; 
            border: none; 
            padding: 10px 0; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.85rem; 
            letter-spacing: 2px;
            transition: all 0.2s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn-order:hover { background: #FFF; transform: scale(1.02); }
        /* ==================================================================== */

        /* 购物车面板 */
        .cart-panel { background: #2F3B36; border: 1px solid #4D5C56; border-radius: 8px; padding: 25px; align-self: start; position: sticky; top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .cart-panel h2 { color: #EFDB96; font-size: 1.3rem; font-weight: 300; margin-top: 0; border-bottom: 1px solid #4D5C56; padding-bottom: 10px; letter-spacing: 2px; }
        .cart-items { max-height: 280px; overflow-y: auto; margin-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #3B4A43; }
        .cart-item-counter { display: flex; align-items: center; gap: 8px; }
        .btn-count { background: #4D5C56; color: #FFF; border: none; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; }
        
        .cart-summary { border-top: 1px solid #4D5C56; padding-top: 15px; margin-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; }
        .btn-submit-order { width: 100%; background: #EFDB96; color: #2F3B36; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 10px; transition: all 0.2s; }
        .btn-submit-order:hover { background: #FFF; }

        /* 后台管理区 */
        #adminSection { grid-column: span 2; margin-top: 40px; padding: 30px; background: #2F3B36; border: 1px solid #4D5C56; display: none; border-radius: 8px; }
        #adminSection h3 { color: #EFDB96; font-weight: 300; margin-top: 0; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #B7CDC2; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; background: #3B4A43; border: 1px solid #4D5C56; color: #F7F6EE; box-sizing: border-box; border-radius: 6px; }
        .form-group input:focus, .form-group textarea:focus { border-color: #EFDB96; outline: none; }
        
        /* AI 预览区域样式 */
        .preview-container { display: flex; align-items: center; gap: 20px; margin: 15px 0; background: #3B4A43; padding: 15px; border-radius: 6px; border: 1px dashed #4D5C56; }
        .preview-img { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid #EFDB96; background: #2F3B36; }
        .btn-secondary { background: #4D5C56; color: #FFF; border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.9rem; margin-right: 10px; transition: background 0.2s; }
        .btn-secondary:hover { background: #5c6e66; }

        .submit-btn { background: #EFDB96; color: #2F3B36; border: none; padding: 12px 28px; cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: all 0.3s; border-radius: 6px; }
        .submit-btn:hover { background: #FFF; color: #2F3B36; }
        
        /* 批量管理列表与按钮 */
        .batch-save-btn { width: 100%; background: #EFDB96; color: #2F3B36; border: none; padding: 15px; cursor: pointer; font-weight: bold; font-size: 1.05rem; border-radius: 6px; letter-spacing: 2px; margin-top: 15px; }
        .batch-save-btn:disabled { background: #4D5C56; color: #8c8273; cursor: not-allowed; }

        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #3B4A43; border: 1px solid #4D5C56; margin-bottom: 8px; border-radius: 6px; }
        .admin-list-item.pending-delete { border-color: #A64B4B; background: #4a3333; opacity: 0.6; }
        
        .action-group { display: flex; gap: 8px; }
        .modify-btn { background: none; color: #EFDB96; border: 1px solid #EFDB96; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
        .modify-btn:hover { background: #EFDB96; color: #2F3B36; }
        .delete-btn { background: none; color: #FF9E9E; border: 1px solid #A64B4B; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
        .delete-btn:hover { background: #A64B4B; color: #fff; }
        
        .admin-toggle { grid-column: span 2; text-align: center; margin-top: 40px; font-size: 0.75rem; color: #4D5C56; cursor: pointer; transition: color 0.2s; }
        .admin-toggle:hover { color: #EFDB96; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="main-content">
        <header>
            <h1>PHOEBE'S PRIVATE KITCHEN</h1>
            <p>— 欢迎光临 · 菲比的私房点单台 —</p>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="filterMenu('all')">全部 ALL</button>
            <button class="tab-btn" onclick="filterMenu('中餐')">中餐 CHINESE</button>
            <button class="tab-btn" onclick="filterMenu('西餐')">西餐 WESTERN</button>
            <button class="tab-btn" onclick="filterMenu('烘焙')">烘焙 BAKERY</button>
            <button class="tab-btn" onclick="filterMenu('咖啡调配')">特调 BAR & CAFE</button>
        </div>

        <div class="menu-section" id="menuContainer"></div>
    </div>

    <div class="cart-panel">
        <h2>已点清单 CART</h2>
        <div class="cart-items" id="cartItemsContainer">
            <p style="color:#B7CDC2; font-style:italic; font-size:0.85rem; text-align:center; margin-top:20px;">桌上空空如也，点个菜吧...</p>
        </div>
        <div class="cart-summary">
            <div class="summary-row">
                <span>总道数 Items:</span>
                <span id="totalCount">0</span>
            </div>
            <button class="btn-submit-order" onclick="placeOrder()">🔔 确认下单 PLACE ORDER</button>
        </div>
    </div>

    <div class="admin-toggle" onclick="handleAdminClick()">ENTER MANAGEMENT DASHBOARD</div>

    <div id="adminSection">
        <h3>🔑 GLOBAL CONFIGURATION</h3>
        <div class="form-group"><label>GitHub Token:</label><input type="password" id="ghToken" placeholder="github_pat_..."></div>
        <div class="form-group"><label>GitHub User:</label><input type="text" id="ghUser" placeholder="phoboww"></div>
        <div class="form-group"><label>Repository Name:</label><input type="text" id="ghRepo" placeholder="phoebe-menu-home"></div>
        
        <hr style="border:0; border-top: 1px solid #4D5C56; margin: 25px 0;">
        
        <h3 id="formModeTitle">🍳 CREATE / MODIFY DISH</h3>
        <input type="hidden" id="editingRecipeId" value="">
        
        <div class="form-group"><label>品名 (AI 将根据这个名字为你现场画图):</label><input type="text" id="foodName" placeholder="如：法式草莓千层蛋糕"></div>
        <div class="form-group">
            <label>分类:</label>
            <select id="foodCategory">
                <option value="中餐">中餐 / CHINESE</option>
                <option value="西餐">西餐 / WESTERN</option>
                <option value="烘焙">烘焙 / BAKERY</option>
                <option value="咖啡调配">咖啡调配 / BAR & CAFE</option>
            </select>
        </div>
        <div class="form-group"><label>菜品介绍/主厨笔记:</label><textarea id="foodNotes" rows="3" placeholder="介绍一下这道拿手绝活..."></textarea></div>
        
        <div class="preview-container" id="aiPreviewBox" style="display:none;">
            <img class="preview-img" id="previewImgElement" src="" alt="AI 画布">
            <div>
                <p style="margin:0 0 10px 0; font-size:0.9rem; color:#EFDB96;">✨ AI 主厨作画完成！</p>
                <button class="btn-secondary" onclick="generateAiImage()">🔄 不满意，重新画一张</button>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-secondary" onclick="generateAiImage()">🎨 召唤 AI 绘制/刷新配图</button>
            <button class="submit-btn" id="submitFormBtn" onclick="saveFormToRecipes()">🚀 确认并把当前数据存入本地</button>
            <button class="btn-secondary" id="cancelEditBtn" onclick="resetForm()" style="display:none; background:#8c4f4f;">取消修改</button>
        </div>

        <hr style="border:0; border-top: 1px solid #4D5C56; margin: 30px 0;">
        <h3>🗑️ 菜单盘点、编辑与批量下架 (✨Batch 模式升级)</h3>
        <div id="adminRecipeList"></div>
        <button class="batch-save-btn" id="batchSaveBtn" onclick="pushToGithub()" disabled>💾 同步云端：保存当前所有修改与盘点 (0项变更)</button>
    </div>
</div>

<script>
    let defaultRecipes = [
        { id: 1, name: "经典冰拿铁", category: "咖啡调配", img: "https://image.pollinations.ai/p/a%20gourmet%20iced%20latte%20with%20perfect%20layers%20of%20milk%20and%20espresso,%20high%20end%20restaurant%20photography?width=400&height=400&nologo=true", notes: "深烘豆 18g 提取 36g 浓缩，搭配 150ml 冰牛奶。冰爽香醇。" },
        { id: 2, name: "黑椒迷迭香牛排", category: "西餐", img: "https://image.pollinations.ai/p/a%20luxurious%20medium%20rare%20ribeye%20steak%20with%20rosemary,%20fine%20dining%20plating?width=400&height=400&nologo=true", notes: "厚切眼肉，大火双面锁汁各 2 分钟，出锅前淋黄油静置。" }
    ];

    let recipes = JSON.parse(localStorage.getItem('my_recipes')) || defaultRecipes;
    let cart = {};
    let pendingDeleteIds = [];
    
    // 用来存放当前正在预览的临时 AI 图片 URL
    let currentTempImageUrl = "";
    // 用来记录本地相较于云端的总变更计数（无论是添加、修改、还是删除）
    let changesCount = 0;

    // ✨ UI设计师重构了动态渲染模版：图片改为大背景，细节装入 Hover 面板
    function renderMenu(data) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = '';
        data.forEach(item => {
            container.insertAdjacentHTML('beforeend', `
                <div class="menu-item">
                    <img class="item-bg-img" src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/400/2F3B36/EFDB96?text=Food'">
                    <div class="item-overlay">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">
                            <div class="item-notes">“ ${item.notes} ”</div>
                            <div class="order-action">
                                <button class="btn-order" onclick="event.stopPropagation(); addToCart(${item.id})">+ 点单</button>
                            </div>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    // 🛒 购物车逻辑
    function addToCart(id) {
        const item = recipes.find(r => r.id === id);
        if (!item) return;
        if (cart[id]) cart[id].count++;
        else cart[id] = { name: item.name, count: 1 };
        updateCartUI();
    }

    function changeCount(id, delta) {
        if (!cart[id]) return;
        cart[id].count += delta;
        if (cart[id].count <= 0) delete cart[id];
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItemsContainer');
        const totalCountSpan = document.getElementById('totalCount');
        container.innerHTML = '';
        let totalCount = 0;
        const keys = Object.keys(cart);
        if (keys.length === 0) {
            container.innerHTML = `<p style="color:#B7CDC2; font-style:italic; font-size:0.85rem; text-align:center; margin-top:20px;">桌上空空如也，点个菜吧...</p>`;
            totalCountSpan.innerText = '0';
            return;
        }
        keys.forEach(id => {
            const item = cart[id];
            totalCount += item.count;
            container.insertAdjacentHTML('beforeend', `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <div class="cart-item-counter">
                        <button class="btn-count" onclick="changeCount(${id}, -1)">-</button>
                        <span>${item.count}</span>
                        <button class="btn-count" onclick="changeCount(${id}, 1)">+</button>
                    </div>
                </div>
            `);
        });
        totalCountSpan.innerText = totalCount;
    }

    function placeOrder() {
        const keys = Object.keys(cart);
        if(keys.length === 0) { alert('您还没有点任何东西哦！'); return; }
        let receipt = `🧾 【PHOEBE'S PRIVATE KITCHEN】\n———————————————\n点单成功！主厨正在为您烹饪：\n\n`;
        keys.forEach(id => { receipt += `▪️ ${cart[id].name}  x  ${cart[id].count}\n`; });
        receipt += `———————————————\n✨ 祝您用餐愉快！Enjoy your meal!`;
        alert(receipt);
        cart = {};
        updateCartUI();
    }

    function generateAiImage() {
        const name = document.getElementById('foodName').value;
        if(!name) { alert('请先填入菜品名称，AI 才能根据名字进行绘画哦！'); return; }
        const randomSeed = Math.floor(Math.random() * 100000);
        // 调高分辨率至 400x400，完美适配大图板块
        currentTempImageUrl = `https://image.pollinations.ai/p/${encodeURIComponent(name)},%20gourmet%20cuisine,%20high%20end%20restaurant%20photography,%20exquisite%20plating?width=400&height=400&nologo=true&seed=${randomSeed}`;
        document.getElementById('previewImgElement').src = currentTempImageUrl;
        document.getElementById('aiPreviewBox').style.display = 'flex';
    }

    function startModifyRecipe(id) {
        const item = recipes.find(r => r.id === id);
        if (!item) return;

        document.getElementById('formModeTitle').innerText = `📝 MODIFY DISH: 【${item.name}】`;
        document.getElementById('editingRecipeId').value = item.id;
        document.getElementById('foodName').value = item.name;
        document.getElementById('foodCategory').value = item.category;
        document.getElementById('foodNotes').value = item.notes;
        
        currentTempImageUrl = item.img;
        document.getElementById('previewImgElement').src = item.img;
        document.getElementById('aiPreviewBox').style.display = 'flex';

        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        document.getElementById('submitFormBtn').innerText = '💾 临时保存本次修改';
        
        document.getElementById('formModeTitle').scrollIntoView({ behavior: 'smooth' });
    }

    function saveFormToRecipes() {
        const idStr = document.getElementById('editingRecipeId').value;
        const name = document.getElementById('foodName').value;
        const category = document.getElementById('foodCategory').value;
        const notes = document.getElementById('foodNotes').value;

        if(!name) { alert('请输入菜品/商品名称！'); return; }
        
        if(!currentTempImageUrl) {
            currentTempImageUrl = `https://image.pollinations.ai/p/${encodeURIComponent(name)},%20gourmet%20cuisine,%20high%20end%20restaurant%20photography,%20exquisite%20plating?width=400&height=400&nologo=true`;
        }

        if(idStr) {
            const targetId = parseInt(idStr);
            recipes = recipes.map(r => {
                if(r.id === targetId) {
                    return { id: targetId, name, category, img: currentTempImageUrl, notes };
                }
                return r;
            });
            alert(`【${name}】的细节修改已记入盘点单！`);
        } else {
            recipes.push({ id: Date.now(), name, category, img: currentTempImageUrl, notes });
            alert(`全新菜品【${name}】已成功加入盘点单！`);
        }

        changesCount++;
        resetForm();
        localStorage.setItem('my_recipes', JSON.stringify(recipes));
        
        renderMenu(recipes);
        renderAdminList();
    }

    function resetForm() {
        document.getElementById('formModeTitle').innerText = `🍳 CREATE / MODIFY DISH`;
        document.getElementById('editingRecipeId').value = "";
        document.getElementById('foodName').value = "";
        document.getElementById('foodNotes').value = "";
        document.getElementById('aiPreviewBox').style.display = 'none';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('submitFormBtn').innerText = '🚀 确认并把当前数据存入本地';
        currentTempImageUrl = "";
    }

    function renderAdminList() {
        const adminListContainer = document.getElementById('adminRecipeList');
        adminListContainer.innerHTML = '';
        
        recipes.forEach(item => {
            const isPending = pendingDeleteIds.includes(item.id);
            
            adminListContainer.insertAdjacentHTML('beforeend', `
                <div class="admin-list-item ${isPending ? 'pending-delete' : ''}">
                    <span><strong style="color:#EFDB96;">[${item.category}]</strong> ${item.name}</span>
                    <div class="action-group">
                        <button class="modify-btn" onclick="startModifyRecipe(${item.id})" ${isPending ? 'disabled style="opacity:0.3;"' : ''}>📝 修改细节</button>
                        <button class="delete-btn" onclick="togglePendingDelete(${item.id})">
                            ${isPending ? '↩️ 撤销下架' : '❌ 下架'}
                        </button>
                    </div>
                </div>
            `);
        });

        const saveBtn = document.getElementById('batchSaveBtn');
        const activeChanges = pendingDeleteIds.length + changesCount;
        if (activeChanges > 0) {
            saveBtn.disabled = false;
            saveBtn.innerText = `💾 同步云端：保存当前所有修改与盘点 (有 ${activeChanges} 项变更待同步)`;
        } else {
            saveBtn.disabled = true;
            saveBtn.innerText = `💾 同步云端：保存当前所有修改与盘点 (无变更)`;
        }
    }

    function togglePendingDelete(id) {
        const index = pendingDeleteIds.indexOf(id);
        if (index > -1) pendingDeleteIds.splice(index, 1);
        else pendingDeleteIds.push(id);
        renderAdminList();
    }

    function filterMenu(category) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if (category === 'all') renderMenu(recipes);
        else renderMenu(recipes.filter(r => r.category === category));
    }

    let clickCount = 0;
    function handleAdminClick() {
        clickCount++;
        if(clickCount >= 3) {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
            document.getElementById('ghUser').value = localStorage.getItem('gh_user') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
            renderAdminList();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    async function pushToGithub() {
        const token = document.getElementById('ghToken').value;
        const user = document.getElementById('ghUser').value;
        const repo = document.getElementById('ghRepo').value;

        if(!token || !user || !repo) { alert('请完善全局配置。'); return; }

        if(confirm(`确认要把当前所有的添加、修改和批量下架的数据，一次性全网同步吗？`)) {
            if(pendingDeleteIds.length > 0) {
                recipes = recipes.filter(r => !pendingDeleteIds.includes(r.id));
            }

            localStorage.setItem('my_recipes', JSON.stringify(recipes));
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_user', user);
            localStorage.setItem('gh_repo', repo);

            const url = `https://api.github.com/repos/${user}/${repo}/contents/index.html`;
            
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await res.json();
                const sha = fileData.sha;
                let oldCode = decodeURIComponent(escape(atob(fileData.content)));

                const updatedRecipesCode = `let defaultRecipes = ${JSON.stringify(recipes, null, 4)};`;
                let newCode = oldCode.replace(/let defaultRecipes = \[\s*[\s\S]*?\];/, updatedRecipesCode);

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Chef updated system inventory`,
                        content: btoa(unescape(encodeURIComponent(newCode))),
                        sha: sha
                    })
                });

                if(putRes.ok) {
                    alert('🎉 全盘数据已成功发布上云！正在重新烹饪网页，请于一分钟后刷新查看最新点单台。');
                    pendingDeleteIds = [];
                    changesCount = 0;
                    location.reload();
                } else {
                    alert('同步失败，请检查配置。');
                }
            } catch (e) {
                alert('发生错误: ' + e.message);
            }
        }
    }

    renderMenu(recipes);
</script>
</body>
</html>
